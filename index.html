<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>X-RAY Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #0A84FF; --green: #30D158; --red: #FF453A;
  --bg: #000000; --glass: rgba(28,28,30,0.80);
  --glass-border: rgba(255,255,255,0.09); --glass-hover: rgba(10,132,255,0.30);
  --text: #FFFFFF; --muted: rgba(255,255,255,0.40);
  --shadow: 0 20px 60px rgba(0,0,0,0.55);
}
[data-theme="light"] {
  --bg: #F2F2F7; --glass: rgba(255,255,255,0.78);
  --glass-border: rgba(0,0,0,0.07); --glass-hover: rgba(10,132,255,0.25);
  --text: #000000; --muted: rgba(0,0,0,0.38);
  --shadow: 0 20px 60px rgba(0,0,0,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 90% 50% at 50% -5%, rgba(10,132,255,0.28), transparent),
    radial-gradient(ellipse 40% 30% at 85% 85%, rgba(48,209,88,0.07), transparent);
  color:var(--text); font-family:'IBM Plex Sans Arabic',sans-serif;
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  padding:14px 14px 90px; transition:background .4s,color .4s;
}
.dynamic-island {
  position:fixed; top:12px; left:50%; transform:translateX(-50%);
  z-index:1000; display:flex; align-items:center; gap:8px;
  background:#1c1c1e; border-radius:22px; padding:8px 18px;
  box-shadow:0 8px 24px rgba(0,0,0,0.6); cursor:pointer;
  text-decoration:none; transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1); -webkit-tap-highlight-color:transparent;
}
.dynamic-island:active{transform:translateX(-50%) scale(0.96);background:#2c2c2e;}
.dynamic-island .di-icon{width:18px;height:18px;flex-shrink:0;fill:#24A1DE;}
.dynamic-island .di-text{font-weight:700;font-size:0.82rem;color:#ffffff;letter-spacing:0.5px;white-space:nowrap;}
.glass{background:var(--glass);backdrop-filter:blur(32px) saturate(200%);-webkit-backdrop-filter:blur(32px) saturate(200%);border:1px solid var(--glass-border);border-radius:22px;box-shadow:var(--shadow);}
.header{width:min(500px,100%);padding:13px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;margin-top:8px;}
.logo{font-family:'Space Mono',monospace;font-size:.88rem;font-weight:700;letter-spacing:2px;color:var(--blue);}
.logo b{color:var(--text);}
.toggle-row{display:flex;align-items:center;gap:8px;}
.toggle-lbl{font-size:.62rem;font-weight:700;color:var(--muted);letter-spacing:1px;}
.ios-sw{width:51px;height:29px;background:#3a3a3c;border-radius:15px;position:relative;cursor:pointer;transition:background .3s;}
[data-theme="light"] .ios-sw{background:#e5e5ea;}
.ios-sw::after{content:'';position:absolute;top:3px;left:3px;width:23px;height:23px;background:#fff;border-radius:50%;transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 2px 6px rgba(0,0,0,.3);}
[data-theme="light"] .ios-sw::after{transform:translateX(22px);}
.screen{width:min(500px,100%);display:none;}
.screen.active{display:block;}
.sec-label{font-size:.65rem;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:20px 0 10px 4px;}
.lec-card{padding:16px 18px;margin-bottom:9px;display:flex;align-items:center;gap:14px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s,transform .15s,box-shadow .2s;}
.lec-card:active{transform:scale(0.98);}
.lec-card:hover{border-color:rgba(10,132,255,0.4);}
.lec-num{width:44px;height:44px;border-radius:11px;background:rgba(10,132,255,.12);border:1px solid rgba(10,132,255,.22);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;color:var(--blue);flex-shrink:0;}
.lec-body{flex:1;}
.lec-name{font-size:.93rem;font-weight:700;margin-bottom:3px;}
.lec-count{font-size:.72rem;color:var(--muted);}
.lec-arrow{color:var(--muted);font-size:1.1rem;}
.progress-wrap{margin-bottom:14px;padding:14px 18px;}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.prog-lec{font-size:.72rem;font-weight:700;color:var(--blue);letter-spacing:.5px;}
.prog-count{font-size:.72rem;color:var(--muted);}
.prog-bar{height:4px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;background:var(--blue);border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1);width:0%;}
.quiz-card{padding:22px 20px;margin-bottom:10px;}
.q-badge{display:inline-block;background:rgba(10,132,255,0.15);color:var(--blue);font-size:.62rem;font-weight:700;letter-spacing:1.5px;padding:3px 10px;border-radius:20px;margin-bottom:12px;border:1px solid rgba(10,132,255,0.2);}
.q-text{font-size:1.0rem;font-weight:700;line-height:1.7;text-align:center;margin-bottom:16px;}
.trans-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.btn-tr{background:rgba(10,132,255,.08);border:1px solid rgba(10,132,255,.18);color:var(--blue);padding:8px;border-radius:10px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;transition:background .2s;}
.btn-tr:active{background:rgba(10,132,255,.2);}
.opt{padding:14px 16px;border-radius:14px;background:rgba(255,255,255,.04);border:1.5px solid var(--glass-border);cursor:pointer;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.opt:active{transform:scale(0.98);}
.opt-letter{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.08);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;flex-shrink:0;transition:all .2s;}
.opt-text{font-size:.92rem;font-weight:600;line-height:1.5;flex:1;}
.opt.correct{background:rgba(48,209,88,.12);border-color:rgba(48,209,88,.5);}
.opt.correct .opt-letter{background:var(--green);color:#000;border-color:var(--green);}
.opt.wrong{background:rgba(255,69,58,.12);border-color:rgba(255,69,58,.5);}
.opt.wrong .opt-letter{background:var(--red);color:#fff;border-color:var(--red);}
.opt.disabled{pointer-events:none;}
.opt.highlight-correct{background:rgba(48,209,88,.12);border-color:rgba(48,209,88,.5);}
.opt.highlight-correct .opt-letter{background:var(--green);color:#000;border-color:var(--green);}
.feedback-box{padding:12px 16px;border-radius:12px;margin-bottom:10px;font-size:.88rem;font-weight:700;text-align:center;display:none;}
.feedback-box.correct{background:rgba(48,209,88,.15);color:var(--green);border:1px solid rgba(48,209,88,.3);}
.feedback-box.wrong{background:rgba(255,69,58,.15);color:var(--red);border:1px solid rgba(255,69,58,.3);}
.next-btn{width:100%;padding:15px;background:var(--blue);color:#fff;border:none;border-radius:14px;font-family:'IBM Plex Sans Arabic',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;display:none;transition:opacity .2s;}
.next-btn:active{opacity:0.8;}
.back-btn{width:min(500px,100%);padding:12px;background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--glass-border);border-radius:14px;font-family:'IBM Plex Sans Arabic',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;margin-bottom:12px;transition:all .2s;}
.back-btn:active{background:rgba(255,255,255,.1);}
.result-card{padding:30px 24px;text-align:center;margin-bottom:12px;}
.result-emoji{font-size:3rem;margin-bottom:12px;}
.result-score{font-size:2.5rem;font-weight:800;color:var(--blue);font-family:'Space Mono',monospace;}
.result-label{font-size:.9rem;color:var(--muted);margin-top:4px;margin-bottom:20px;}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-box{padding:14px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid var(--glass-border);}
.stat-val{font-size:1.4rem;font-weight:800;font-family:'Space Mono',monospace;}
.stat-lbl{font-size:.68rem;color:var(--muted);margin-top:2px;}
.retry-btn{width:100%;padding:15px;background:var(--blue);color:#fff;border:none;border-radius:14px;font-family:'IBM Plex Sans Arabic',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;margin-bottom:10px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.quiz-card,.lec-card,.progress-wrap{animation:fadeUp .35s ease both;}
</style>
</head>
<body data-theme="dark">

<a href="https://t.me/XrayB1" target="_blank" class="dynamic-island">
  <svg class="di-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/></svg>
  <span class="di-text">قناة X-RAY على التليجرام</span>
</a>

<div class="header glass">
  <div class="logo">X<b>-RAY</b> <span style="color:var(--muted);font-size:.7rem;letter-spacing:1px;">PLATFORM</span></div>
  <div class="toggle-row">
    <span class="toggle-lbl">MODE</span>
    <div class="ios-sw" onclick="toggleMode()"></div>
  </div>
</div>

<!-- شاشة القائمة الرئيسية -->
<div id="screen-home" class="screen active">
  <div class="sec-label">المحاضرات المتاحة</div>
  <div id="lectures-list"></div>
</div>

<!-- شاشة الاختبار -->
<div id="screen-quiz" class="screen">
  <button class="back-btn glass" onclick="goHome()">← العودة للمحاضرات</button>
  <div class="progress-wrap glass">
    <div class="prog-top">
      <span class="prog-lec" id="prog-lec-name">جاري التحميل...</span>
      <span class="prog-count" id="prog-count">0/0</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
  </div>
  <div class="quiz-card glass">
    <div class="q-badge" id="q-badge">TYPE</div>
    <div class="q-text" id="q-text">نص السؤال سيظهر هنا</div>
    <div class="trans-row">
      <button class="btn-tr" onclick="translateQuestion()">🌐 ترجمة السؤال</button>
      <button class="btn-tr" onclick="translateOptions()">🌐 ترجمة الخيارات</button>
    </div>
    <div id="opts-wrap"></div>
    <div class="feedback-box" id="feedback-box"></div>
    <button id="next-btn" class="next-btn" onclick="nextQuestion()">السؤال التالي ←</button>
  </div>
</div>

<!-- شاشة النتيجة -->
<div id="screen-result" class="screen">
  <div class="result-card glass">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-score" id="result-score">0/0</div>
    <div class="result-label" id="result-label">النتيجة</div>
    <div class="result-stats">
      <div class="stat-box">
        <div class="stat-val" id="stat-correct" style="color:var(--green)">0</div>
        <div class="stat-lbl">✅ صحيح</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-wrong" style="color:var(--red)">0</div>
        <div class="stat-lbl">❌ خطأ</div>
      </div>
    </div>
    <button class="retry-btn" onclick="retryQuiz()">🔁 إعادة المحاضرة</button>
    <button class="back-btn glass" onclick="goHome()" style="margin-bottom:0;">← العودة للمحاضرات</button>
  </div>
</div>

<script>
// ============================================================
// البيانات - جميع المحاضرات من 1 إلى 15
// ============================================================
const LECTURES = [
  {
    id: 1,
    name: "Lecture 1 - X-Ray Machine System & Operating Console",
    nameAr: "المحاضرة 1 - جهاز الأشعة السينية ولوحة التحكم",
    questions: [
      {
        type: "COMPONENT ID",
        q: "What is the primary function of the Operating Console in an X-ray machine?",
        opts: [
          "To generate the high voltage needed for X-ray production",
          "To allow the technologist to control kVp, mA, and exposure time",
          "To rotate the anode during exposure",
          "To convert AC to DC current for the X-ray tube",
          "To filter low-energy X-rays from the beam"
        ],
        answer: 1
      },
      {
        type: "REFERENCE VALUES",
        q: "Most X-ray machines are designed to operate on what standard power source voltage?",
        opts: ["110 V", "120 V", "180 V", "220 V", "440 V"],
        answer: 3
      },
      {
        type: "INTERPRETATION",
        q: "A radiographer increases the kVp on the console. Which of the following correctly describes the effect on the X-ray beam?",
        opts: [
          "Electrons travel more slowly; longer wavelength X-rays produced",
          "Electrons travel faster; shorter wavelength (harder) X-rays produced",
          "The quantity of X-rays increases; quality remains unchanged",
          "The filament current increases automatically",
          "Exposure time increases proportionally"
        ],
        answer: 1
      },
      {
        type: "INTERPRETATION",
        q: "Which console control specifically affects the QUANTITY (number of photons) of X-rays produced?",
        opts: ["kVp selector", "Line voltage compensator", "mAs (milliamperage)", "Electronic timer", "Kilovoltage selector"],
        answer: 2
      },
      {
        type: "COMPARISONS",
        q: "A department requires the most accurate and expensive timing system for their new X-ray unit. Which timer type should they select?",
        opts: [
          "Mechanical timer — clockwork-based, inexpensive",
          "Synchronous timer — motor-driven at 60 rev/sec",
          "Electronic timer — most accurate, capacitor-based circuitry",
          "mAs timer — terminates at desired mAs product",
          "AEC/phototimer — terminates based on receptor dose"
        ],
        answer: 2
      },
      {
        type: "CLINICAL SCENARIO",
        q: "A technologist notices the X-ray image is consistently overexposed despite correct kVp. The line voltage compensator shows incoming voltage is higher than 220V. What should happen automatically in modern machines?",
        opts: [
          "The machine shuts down to prevent damage",
          "The line compensator automatically adjusts voltage back to 220V",
          "The mA selector compensates by reducing tube current",
          "The timer extends to balance the excess voltage",
          "The AEC overrides all manual settings"
        ],
        answer: 1
      },
      {
        type: "COMPARISONS",
        q: "Which timer type automatically terminates the exposure when sufficient radiation has been received by the image receptor, regardless of time or mAs?",
        opts: [
          "Mechanical timer",
          "Synchronous timer",
          "Electronic timer",
          "mAs timer",
          "AEC / Phototimer"
        ],
        answer: 4
      },
      {
        type: "COMPONENT ID",
        q: "The Voltage Compensator (Line Compensation) on the operating console serves what specific purpose?",
        opts: [
          "Converts AC current to DC for the X-ray tube",
          "Controls the milliamperage of the filament circuit",
          "Compensates incoming voltage variations to maintain constant 220V",
          "Selects the desired kVp for the exposure",
          "Monitors radiation dose reaching the image receptor"
        ],
        answer: 2
      }
    ]
  },
  {
    id: 2,
    name: "Lecture 2 - High Voltage Generators",
    nameAr: "المحاضرة 2 - المولدات عالية الجهد",
    questions: [
      {
        type: "REFERENCE VALUES",
        q: "What is the typical high-voltage output range of a medical X-ray high-voltage generator?",
        opts: ["5 kV to 30 kV", "30 kV to 150 kV", "150 kV to 300 kV", "300 kV to 500 kV", "1 kV to 10 kV"],
        answer: 1
      },
      {
        type: "REFERENCE VALUES",
        q: "What is the turns ratio range of a high-voltage step-up transformer in a standard X-ray machine?",
        opts: ["10 to 50", "50 to 200", "200 to 500", "500 to 1000", "1000 to 5000"],
        answer: 3
      },
      {
        type: "COMPONENT ID",
        q: "The autotransformer in an X-ray machine operates on which principle and supplies voltage to which circuits?",
        opts: [
          "Mutual induction; supplies only the filament circuit",
          "Self-induction; supplies the filament circuit and high-voltage circuit",
          "Full-wave rectification; supplies all three circuits equally",
          "Step-down transformation; supplies only the primary circuit",
          "Capacitor discharge; supplies the secondary circuit only"
        ],
        answer: 1
      },
      {
        type: "REFERENCE VALUES",
        q: "What is the voltage ripple percentage for a single-phase, full-wave rectified generator?",
        opts: ["0%", "3%", "13%", "50%", "100%"],
        answer: 4
      },
      {
        type: "REFERENCE VALUES",
        q: "What voltage ripple does a three-phase, 6-pulse generator produce?",
        opts: ["Less than 1%", "3%", "13%", "50%", "100%"],
        answer: 2
      },
      {
        type: "REFERENCE VALUES",
        q: "What voltage ripple does a high-frequency generator produce?",
        opts: ["Less than 1%", "3%", "13%", "50%", "100%"],
        answer: 0
      },
      {
        type: "COMPARISONS",
        q: "Compared to a single-phase generator, what is the PRIMARY clinical advantage of a high-frequency generator?",
        opts: [
          "It is cheaper and easier to install",
          "It produces more low-energy soft X-rays for better soft tissue contrast",
          "It provides shorter exposure times, higher average photon energy, and lower patient dose",
          "It has higher voltage ripple, producing more X-ray photons",
          "It is exclusively used for dental radiography"
        ],
        answer: 2
      },
      {
        type: "INTERPRETATION",
        q: "A single-phase generator drops its voltage to zero 120 times per second. What is the clinical consequence of this waveform characteristic?",
        opts: [
          "Higher average photon energy reaching the detector",
          "Improved image contrast and reduced scatter radiation",
          "Greater amount of low-energy soft X-rays absorbed by the patient, increasing dose",
          "Shorter required exposure time compared to three-phase",
          "The image receptor receives more consistent radiation intensity"
        ],
        answer: 2
      },
      {
        type: "COMPONENT ID",
        q: "In the filament circuit, the filament step-down transformer decreases voltage to what level and increases amperage to what range?",
        opts: [
          "Decreases to 220V; increases to 10-12A",
          "Decreases to 10-12V; increases to 3-5A",
          "Decreases to 40-150 kV; increases to 100-300 mA",
          "Decreases to 5V; increases to 1-2A",
          "Decreases to 50V; increases to 20-30A"
        ],
        answer: 1
      },
      {
        type: "INTERPRETATION",
        q: "Rectification is necessary in X-ray circuits because:",
        opts: [
          "Transformers operate with DC but X-ray tubes require AC",
          "Transformers operate with AC but X-ray tubes must be provided with DC",
          "High-voltage transformers cannot function without rectification",
          "The filament circuit requires alternating current to function",
          "Rectification increases the kVp beyond transformer limits"
        ],
        answer: 1
      }
    ]
  },
  {
    id: 3,
    name: "Lecture 3 - X-Ray Tube",
    nameAr: "المحاضرة 3 - أنبوب الأشعة السينية",
    questions: [
      {
        type: "COMPONENT ID",
        q: "What is the function of the Focusing Cup in the cathode assembly?",
        opts: [
          "Heats the filament to produce thermionic emission",
          "Condenses the electron beam to a small area of the anode (focal spot) and prevents electron spread",
          "Accelerates electrons toward the anode using high voltage",
          "Filters low-energy electrons before they reach the target",
          "Maintains the vacuum inside the glass envelope"
        ],
        answer: 1
      },
      {
        type: "REFERENCE VALUES",
        q: "At what filament current level do outer-shell electrons get 'boiled off' in thermionic emission?",
        opts: ["Approximately 1A and above", "Approximately 2A and above", "Approximately 4A and above", "Approximately 10A and above", "Approximately 0.5A and above"],
        answer: 2
      },
      {
        type: "REFERENCE VALUES",
        q: "What is the most common anode target angle used in X-ray tubes?",
        opts: ["5 degrees", "8 degrees", "12 degrees", "25 degrees", "45 degrees"],
        answer: 2
      },
      {
        type: "REFERENCE VALUES",
        q: "At standard settings, what is the rotation speed of a rotating anode?",
        opts: ["1,000 rpm", "1,800 rpm", "3,200 rpm", "5,000 rpm", "10,000 rpm"],
        answer: 2
      },
      {
        type: "INTERPRETATION",
        q: "As the anode angle DECREASES, what happens to both the effective focal spot and the anode heel effect?",
        opts: [
          "Focal spot gets larger; heel effect increases",
          "Focal spot gets smaller; heel effect decreases",
          "Focal spot gets smaller; heel effect increases",
          "Focal spot gets larger; heel effect decreases",
          "Both remain unchanged; only beam intensity changes"
        ],
        answer: 2
      },
      {
        type: "CLINICAL SCENARIO",
        q: "A radiographer is imaging the femur. The proximal femur (hip side) is significantly thicker and denser than the distal end (knee side). How should the tube be oriented relative to the anode heel effect?",
        opts: [
          "Place the anode side over the hip — it produces higher intensity",
          "Place the cathode side over the hip — it has the most penetrating beam",
          "Rotate the tube 90° to eliminate the heel effect entirely",
          "Increase the SID to compensate for beam intensity differences",
          "Use a crossed grid to equalize beam distribution"
        ],
        answer: 1
      },
      {
        type: "COMPARISONS",
        q: "Why is tungsten preferred as the target material in X-ray tubes? Select the MOST comprehensive reason.",
        opts: [
          "It is the cheapest metal available for target manufacturing",
          "It has a low atomic number, producing fewer X-rays but with higher efficiency",
          "It has high atomic number (74), high melting point (3410°C), good thermal conductivity, and resists vaporization",
          "It has the highest density of all metals, absorbing scattered radiation",
          "It naturally produces characteristic X-rays in the diagnostic energy range"
        ],
        answer: 2
      },
      {
        type: "COMPONENT ID",

// ============================================================
// منطق التطبيق
// ============================================================
let currentLecture = null;
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = false;
let wrongAnswers = 0;

const letters = ['A', 'B', 'C', 'D', 'E'];

function toggleMode() {
  const body = document.body;
  body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  showScreen('screen-home');
}

// بناء قائمة المحاضرات
function buildLectureList() {
  const list = document.getElementById('lectures-list');
  list.innerHTML = '';
  LECTURES.forEach((lec, i) => {
    const div = document.createElement('div');
    div.className = 'lec-card glass';
    div.style.animationDelay = `${i * 0.05}s`;
    div.innerHTML = `
      <div class="lec-num">L${lec.id}</div>
      <div class="lec-body">
        <div class="lec-name">${lec.nameAr}</div>
        <div class="lec-count">${lec.questions.length} سؤال</div>
      </div>
      <div class="lec-arrow">›</div>
    `;
    div.onclick = () => startLecture(lec);
    list.appendChild(div);
  });
}

function startLecture(lec) {
  currentLecture = lec;
  currentQuestions = [...lec.questions];
  currentIndex = 0;
  score = 0;
  wrongAnswers = 0;
  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = currentQuestions[currentIndex];
  const total = currentQuestions.length;
  const pct = (currentIndex / total) * 100;

  document.getElementById('prog-lec-name').textContent = currentLecture.nameAr;
  document.getElementById('prog-count').textContent = `${currentIndex + 1}/${total}`;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('q-badge').textContent = q.type;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('feedback-box').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';

  const wrap = document.getElementById('opts-wrap');
  wrap.innerHTML = '';
  answered = false;

  q.opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'opt';
    div.innerHTML = `
      <div class="opt-letter">${letters[i]}</div>
      <div class="opt-text">${opt}</div>
    `;
    div.onclick = () => selectAnswer(i, q.answer);
    wrap.appendChild(div);
  });
}

function selectAnswer(selected, correct) {
  if (answered) return;
  answered = true;

  const opts = document.querySelectorAll('.opt');
  opts.forEach((opt, i) => {
    opt.classList.add('disabled');
    if (i === correct) opt.classList.add('correct');
    if (i === selected && selected !== correct) opt.classList.add('wrong');
  });

  const fb = document.getElementById('feedback-box');
  if (selected === correct) {
    score++;
    fb.textContent = '✅ إجابة صحيحة!';
    fb.className = 'feedback-box correct';
  } else {
    wrongAnswers++;
    fb.textContent = `❌ خطأ! الإجابة الصحيحة: ${letters[correct]}`;
    fb.className = 'feedback-box wrong';
  }
  fb.style.display = 'block';
  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= currentQuestions.length) {
    showResult();
  } else {
    renderQuestion();
    window.scrollTo(0, 0);
  }
}

function showResult() {
  const total = currentQuestions.length;
  const pct = Math.round((score / total) * 100);
  let emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '📚';
  let label = pct >= 80 ? 'ممتاز! أداء رائع' : pct >= 60 ? 'جيد! يمكنك التحسين' : 'تحتاج مراجعة المحاضرة';

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-score').textContent = `${score}/${total}`;
  document.getElementById('result-label').textContent = `${pct}% — ${label}`;
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = wrongAnswers;
  showScreen('screen-result');
}

function retryQuiz() {
  startLecture(currentLecture);
}

// ترجمة بسيطة عبر Google Translate API المجاني
function translateQuestion() {
  const text = document.getElementById('q-text').textContent;
  const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ar&dt=t&q=${encodeURIComponent(text)}`;
  fetch(url).then(r => r.json()).then(data => {
    const translated = data[0].map(x => x[0]).join('');
    document.getElementById('q-text').textContent = translated;
  }).catch(() => alert('تعذّر الاتصال بخدمة الترجمة'));
}

function translateOptions() {
  const opts = document.querySelectorAll('.opt-text');
  opts.forEach(opt => {
    const text = opt.textContent;
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ar&dt=t&q=${encodeURIComponent(text)}`;
    fetch(url).then(r => r.json()).then(data => {
      opt.textContent = data[0].map(x => x[0]).join('');
    });
  });
}
